<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f3f4f6; }
        .ltr-content { direction: ltr; text-align: left; }
        /* Accordion Logic */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0, 1, 0, 1); }
        .accordion-open .accordion-content { max-height: 1000px; transition: max-height 0.4s ease-in; }
        .chevron { transition: transform 0.3s ease; }
        .accordion-open .chevron { transform: rotate(180deg); }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/80 backdrop-blur-md shadow-sm py-4 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="logo.svg" alt="Word Academy Logo" class="w-12 h-12">
            <h1 class="text-2xl font-black text-blue-900">Word Academy</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="showLoginModal('teacher')" class="px-5 py-2 border-2 border-blue-600 text-blue-600 font-bold rounded-full hover:bg-blue-50 transition text-sm md:text-base">כניסת מורים</button>
            <button onclick="showLoginModal('student')" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-full shadow-lg hover:bg-blue-700 transition text-sm md:text-base">כניסת תלמידים</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div id="library-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <p class="text-center col-span-full text-slate-500 animate-pulse">טוען את הספרייה...</p>
        </div>
    </main>

    <script>
        // המרת הקישור ששלחת לפורמט CSV לצורך משיכת נתונים
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBLf3lCxJ0JcbeEc9nCB7eoyFKN98wIem2rDUYMBoup8Yw6kkv_T41BqwnILLBQXE5ibWV9HJAOzC/pub?output=csv';

        async function initLibrary() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const booksData = parseCSV(data);
                renderLibrary(booksData);
            } catch (error) {
                console.error("Error loading library:", error);
            }
        }

        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.split(','));
            const books = {};
            
            // דילוג על כותרות (A: Book, B: Grade, C: Chapter, D: Unit, E: Link, F: Color)
            for (let i = 1; i < lines.length; i++) {
                const [book, grade, chapter, unit, link, color] = lines[i];
                if (!book) continue;

                if (!books[book]) {
                    books[book] = { grade, color: color?.trim() || '#3b82f6', chapters: {} };
                }
                if (!books[book].chapters[chapter]) {
                    books[book].chapters[chapter] = [];
                }
                books[book].chapters[chapter].push({ unit, link });
            }
            return books;
        }

        function renderLibrary(books) {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';

            Object.entries(books).forEach(([bookName, info]) => {
                const card = document.createElement('div');
                // עיצוב הכרטיסייה לפי דרישה: פינות מעוגלות 2.5rem, צל עמוק, גבול עליון עבה
                card.className = "bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col hover:translate-y-[-5px] transition-all duration-300";
                card.style.borderTop = `8px solid ${info.color}`;

                let accordionHtml = '';
                Object.entries(info.chapters).forEach(([chapter, units]) => {
                    accordionHtml += `
                        <div class="border-b border-slate-50 accordion-item">
                            <button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full py-4 px-6 flex justify-between items-center hover:bg-slate-50 group">
                                <span class="chevron text-slate-300 group-hover:text-blue-500">▼</span>
                                <span class="ltr-content font-bold text-slate-700">${chapter}</span>
                            </button>
                            <div class="accordion-content bg-slate-50/50">
                                <div class="px-6 py-2 flex flex-col gap-2 ltr-content">
                                    ${units.map(u => `
                                        <a href="${u.link}" target="_blank" class="py-2 text-blue-500 hover:text-blue-700 font-medium flex items-center gap-2">
                                            <span class="w-1.5 h-1.5 rounded-full bg-blue-300"></span>
                                            ${u.unit}
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="p-6 flex justify-between items-center bg-slate-50/30">
                        <div class="bg-white/80 backdrop-blur px-4 py-1.5 rounded-full text-xs font-black shadow-sm border border-slate-100 uppercase tracking-wider" style="color: ${info.color}">
                            ${info.grade}
                        </div>
                        <h2 class="text-xl font-extrabold text-slate-800 ltr-content">${bookName}</h2>
                    </div>
                    <div class="flex-grow">
                        ${accordionHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = initLibrary;
    </script>
</body>
</html>
