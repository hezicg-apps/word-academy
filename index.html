<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .books-grid { 
            display: grid; 
            grid-template-cols: repeat(3, 1fr); /* כופה 3 טורים במחשב */
            gap: 30px; 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 20px;
        }
        @media (max-width: 1024px) { .books-grid { grid-template-cols: 1fr; } } /* בטלפון טור אחד */

        .book-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .chapter-btn { 
            width: 100%; padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            cursor: pointer; direction: ltr; border-bottom: 1px solid #f1f5f9;
        }
        .units-list { max-height: 0; overflow: hidden; transition: 0.3s; background: #fafafa; }
        .is-open .units-list { max-height: 1000px; }
        .is-open .chevron { transform: rotate(180deg); }
        .unit-link { display: block; padding: 10px 25px; color: #64748b; direction: ltr; text-align: left; text-decoration: none; font-weight: bold; }
        .unit-link:hover { background: #f1f5f9; }
    </style>
</head>
<body>
    <header class="p-10 text-center">
        <h1 class="text-5xl font-black text-blue-600">Word Academy</h1>
        <p class="text-gray-400 font-bold mt-2">🦉 תרגול אוצר מילים בכיף</p>
    </header>

    <div id="content" class="books-grid"></div>

    <script>
        const SHEET_ID = '1HJ1UDVuzqvWS66hprx8dSFqqoS0OVvZFGOGaRtyDPu8';
        async function load() {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const data = json.table.rows.map(r => ({
                book: r.c[0]?.v, grade: r.c[1]?.v, chap: r.c[2]?.v, unit: r.c[3]?.v, link: r.c[4]?.v, color: r.c[5]?.v
            })).filter(i => i.book && i.book !== 'Book');

            const books = [...new Set(data.map(d => d.book))];
            const container = document.getElementById('content');
            
            books.forEach(b => {
                const bData = data.filter(d => d.book === b);
                const color = bData[0].color || '#3b82f6';
                let html = `
                    <div class="book-card" style="border-top: 8px solid ${color}">
                        <div class="p-6 flex justify-between items-center bg-white">
                            <h2 class="text-2xl font-black">${b}</h2>
                            <span style="background:${color}" class="text-white px-3 py-1 rounded-full text-xs font-bold">${bData[0].grade}</span>
                        </div>`;
                
                const chaps = [...new Set(bData.map(d => d.chap))];
                chaps.forEach(c => {
                    const units = bData.filter(u => u.chap === c);
                    html += `
                        <div class="chapter-row">
                            <div class="chapter-btn" onclick="this.parentElement.classList.toggle('is-open')">
                                <span class="font-bold text-slate-500">${c ? c.toUpperCase() : 'GENERAL'}</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div class="units-list">
                                ${units.map(u => `<a href="app/index.html?w=${u.link}" target="_blank" class="unit-link">${u.unit}</a>`).join('')}
                            </div>
                        </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }
        load();
    </script>
</body>
</html>
