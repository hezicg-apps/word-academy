<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0f4f8; color: #1e293b; margin: 0; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: transparent;
            direction: ltr;
        }

        .brand-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-title { font-size: 1.8rem; font-weight: 800; color: #facc15; }

        /* כרטיסיית הספר - העיצוב מהתמונה */
        .book-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .book-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 2.5rem 2.5rem 0 0;
        }

        .grade-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        /* Dropdown פרקים */
        .chapter-row { border-bottom: 1px solid #f1f5f9; }
        .chapter-btn {
            width: 100%;
            padding: 1.25rem 2rem;
            display: flex;
            flex-direction: row-reverse; /* חץ מימין, טקסט משמאל */
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chapter-btn:hover { background: #fafafa; }
        
        .chapter-title { font-weight: 800; font-size: 0.95rem; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .chevron { 
            transition: transform 0.3s; 
            font-size: 0.8rem; 
            color: #cbd5e1;
        }
        .open .chevron { transform: rotate(180deg); }
        .open .chapter-btn { background: #f8fafc; }

        .units-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background: #fff;
        }
        .open .units-list { max-height: 500px; padding-bottom: 1rem; }

        .unit-link {
            display: block;
            padding: 0.75rem 3rem;
            font-size: 0.9rem;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            text-align: right;
        }
        .unit-link:hover { color: #0f172a; background: #f1f5f9; padding-right: 3.5rem; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="brand-logo">
            <img src="Logo.svg" alt="WA" class="h-12">
            <span class="brand-title">Word Adventure</span>
        </a>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-8">
        <div id="books-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-10">
            </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
