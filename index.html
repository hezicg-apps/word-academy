<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | Explore</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; margin: 0; }
        
        header {
            display: flex;
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            direction: ltr; /* לוגו משמאל, כפתורים מימין */
        }

        .brand-text span.w { color: #38bdf8; }
        .brand-text span.a { color: #a855f7; }

        .wa-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2.5rem;
        }
        .wa-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="flex items-center gap-3 no-underline">
            <img src="Logo.svg" alt="WA" class="h-10" id="logo-img">
            <div class="brand-text text-2xl font-black text-black font-sans">
                <span class="w">W</span>ord <span class="a">A</span>cademy
            </div>
        </a>
        <div class="flex gap-3" style="direction: rtl;">
            <a href="#" class="bg-[#38bdf8] text-white px-5 py-2 rounded-full font-bold shadow-sm text-sm">כניסת מורים</a>
            <a href="#" class="bg-[#a855f7] text-white px-5 py-2 rounded-full font-bold shadow-sm text-sm">כניסת תלמידים</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6 text-center">
        <h2 id="page-title" class="text-4xl font-black text-slate-800 mb-12">הספרייה שלנו</h2>
        
        <div id="books-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div class="col-span-full py-20 text-slate-400 font-bold">טוען נתונים מהגיליון...</div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
