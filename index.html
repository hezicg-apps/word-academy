<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | ספרייה</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; margin: 0; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            direction: ltr;
        }
        .brand-text span.w { color: #38bdf8; }
        .brand-text span.a { color: #a855f7; }
        
        /* עיצוב כרטיסיות ספר */
        .book-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-top: 12px solid #cbd5e1;
            transition: transform 0.3s ease;
        }
        .book-card:hover { transform: translateY(-5px); }
        
        /* Dropdown סטייל */
        .chapter-section { border-bottom: 1px solid #f1f5f9; }
        .chapter-header { cursor: pointer; padding: 1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chapter-header:hover { background: #f8fafc; }
        .units-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #f8fafc; }
        .open .units-list { max-height: 1000px; }
        .open .chevron { transform: rotate(180deg); }
        .chevron { transition: transform 0.3s; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="flex items-center gap-3 no-underline">
            <img src="Logo.svg" alt="WA" class="h-10">
            <div class="brand-text text-2xl font-black text-black font-sans">
                <span class="w">W</span>ord <span class="a">A</span>cademy
            </div>
        </a>
        <div class="flex gap-3" style="direction: rtl;">
            <a href="#" class="bg-[#38bdf8] text-white px-5 py-2 rounded-full font-bold shadow-sm text-sm">כניסת מורים</a>
            <a href="#" class="bg-[#a855f7] text-white px-5 py-2 rounded-full font-bold shadow-sm text-sm">כניסת תלמידים</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <h2 id="page-title" class="text-4xl font-black text-center text-slate-800 mb-16">הספרים שלנו</h2>
        
        <div id="books-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center text-slate-400">מתחבר לנתונים...</div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
