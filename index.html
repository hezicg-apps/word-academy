<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | בחירת ספר לימוד</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-blue: #38bdf8;   
            --logo-purple: #a855f7; 
            --text-black: #1e293b;
            --bg-light: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-black);
        }

        header {
            display: flex;
            /* הכוח עובר לכאן: row גורם לצדדים להיקבע לפי סדר ה-HTML */
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4%;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* צד שמאל: לוגו ושם */
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .header-left img {
            height: 40px;
            width: auto;
        }

        .brand-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: black;
            letter-spacing: -0.5px;
            /* שימוש בפונט לועזי לשם המותג */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .brand-text span.w { color: var(--logo-blue); }
        .brand-text span.a { color: var(--logo-purple); }

        /* צד ימין: כפתורים */
        .header-right {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-teacher {
            background-color: var(--logo-blue);
        }

        .btn-student {
            background-color: var(--logo-purple);
        }

        .container {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2.2rem;
            margin-bottom: 3rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-black);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .book-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .book-card:hover {
            transform: translateY(-10px);
            border-color: var(--logo-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .book-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }

        .book-title {
            font-weight: 700;
            font-size: 1.3rem;
            margin: 0;
        }

        .book-grade {
            font-size: 1rem;
            color: #64748b;
            margin-top: 8px;
        }

        .add-book-card {
            border: 2px dashed #e2e8f0;
            background: #fbfcfd;
        }

        @media (max-width: 768px) {
            header { padding: 1rem 5%; }
            .brand-text { font-size: 1.2rem; }
            .btn { padding: 8px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="header-left">
            <img src="Logo.svg" alt="Word Academy">
            <div class="brand-text">
                <span class="w">W</span>ord <span class="a">A</span>cademy
            </div>
        </a>

        <div class="header-right">
            <a href="#" class="btn btn-teacher">כניסת מורים</a>
            <a href="#" class="btn btn-student">כניסת תלמידים</a>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">בחרו ספר לימוד</h2>
        
        <div class="books-grid">
            <div class="book-card">
                <span class="book-icon">📚</span>
                <div class="book-title">Epic</div>
                <div class="book-grade">כיתה ג'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">🏆</span>
                <div class="book-title">Legendary</div>
                <div class="book-grade">כיתה ד'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">✨</span>
                <div class="book-title">Magical</div>
                <div class="book-grade">כיתה ה'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">💡</span>
                <div class="book-title">Think About It</div>
                <div class="book-grade">כיתה ו'</div>
            </div>

            <div class="book-card add-book-card">
                <span style="font-size: 2.5rem; color: #cbd5e1; margin-bottom: 10px;">+</span>
                <div class="book-title" style="color: #64748b;">הוסיפו ספר משלכן/ם</div>
                <div class="book-grade">או בקשו מאיתנו</div>
            </div>
        </div>
    </div>

</body>
</html>
