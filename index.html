<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | Explore Books</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        
        /* עיצוב ה-Header המדויק שביקשת */
        .custom-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            direction: ltr; /* לוגו משמאל */
        }

        .brand-text span.w { color: #38bdf8; }
        .brand-text span.a { color: #a855f7; }

        /* כרטיסיית ספר בסגנון WA-WEBSITE */
        .wa-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .wa-card:hover {
            transform: translateY(-10px) scale(1.02);
        }
    </style>
</head>
<body>

    <header class="custom-header">
        <a href="#" class="flex items-center gap-3 no-underline">
            <img src="Logo.svg" alt="WA" class="h-10">
            <div class="brand-text text-2xl font-extrabold text-black font-sans">
                <span class="w">W</span>ord <span class="a">A</span>cademy
            </div>
        </a>
        <div class="flex gap-3" style="direction: rtl;">
            <a href="#" class="bg-[#38bdf8] text-white px-5 py-2 rounded-full font-bold shadow-md">כניסת מורים</a>
            <a href="#" class="bg-[#a855f7] text-white px-5 py-2 rounded-full font-bold shadow-md">כניסת תלמידים</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-16 px-6">
        <h2 class="text-4xl font-black text-center text-slate-800 mb-16">בחרו ספר לימוד</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
            
            <div class="wa-card bg-white rounded-[2.5rem] p-8 text-center shadow-xl border-t-[12px] border-[#5ba2d0]">
                <h3 class="text-2xl font-black text-slate-800">Epic</h3>
                <p class="text-slate-400 font-bold mt-2">כיתה ג'</p>
            </div>

            <div class="wa-card bg-white rounded-[2.5rem] p-8 text-center shadow-xl border-t-[12px] border-[#652286]">
                <h3 class="text-2xl font-black text-slate-800">Legendary</h3>
                <p class="text-slate-400 font-bold mt-2">כיתה ד'</p>
            </div>

            <div class="wa-card bg-white rounded-[2.5rem] p-8 text-center shadow-xl border-t-[12px] border-[#4e1522]">
                <h3 class="text-2xl font-black text-slate-800">Magical</h3>
                <p class="text-slate-400 font-bold mt-2">כיתה ה'</p>
            </div>

            <div class="wa-card bg-white rounded-[2.5rem] p-8 text-center shadow-xl border-t-[12px] border-[#97dee4]">
                <h3 class="text-2xl font-black text-slate-800 leading-tight">Think<br>About It</h3>
                <p class="text-slate-400 font-bold mt-2">כיתה ו'</p>
            </div>

            <div class="wa-card bg-slate-50 rounded-[2.5rem] p-8 text-center shadow-inner border-2 border-dashed border-slate-200">
                <h3 class="text-xl font-bold text-slate-500">הספר שלי לא נמצא</h3>
                <p class="text-slate-400 mt-2">עזרו לי...</p>
            </div>

        </div>
    </main>

</body>
</html>
