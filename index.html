<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure | מרכז למידה</title>
    <link rel="icon" type="image/png" href="WA-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .border-sky-500 { border-color: #0ea5e9; } .bg-sky-50 { background-color: #f0f9ff; } .text-sky-900 { color: #0c4a6e; } .hover\:bg-sky-100:hover { background-color: #e0f2fe; }
        .border-amber-500 { border-color: #f59e0b; } .bg-amber-50 { background-color: #fffbeb; } .text-amber-900 { color: #78350f; } .hover\:bg-amber-100:hover { background-color: #fef3c7; }
        .border-violet-500 { border-color: #8b5cf6; } .bg-violet-50 { background-color: #f5f3ff; } .text-violet-900 { color: #4c1d95; } .hover\:bg-violet-100:hover { background-color: #ede9fe; }
        .border-emerald-500 { border-color: #10b981; } .bg-emerald-50 { background-color: #ecfdf5; } .text-emerald-900 { color: #064e3b; } .hover\:bg-emerald-100:hover { background-color: #d1fae5; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 sm:p-8 bg-slate-50 min-h-screen">

    <header class="text-center mb-10 animate-fade-in">
        <img src="logo_inner.png" alt="Logo" class="w-32 mx-auto mb-4 drop-shadow-md">
        <h1 class="text-4xl font-black text-blue-600">Word Adventure</h1>
        <p class="text-gray-500 font-bold mt-2 text-lg">תרגול אוצר מילים בכיף 🚀</p>
    </header>

    <div id="loading" class="text-center font-bold text-blue-500 animate-pulse py-10">מתחבר לענן המילים...</div>
    <div id="content" class="max-w-4xl mx-auto space-y-8 pb-10"></div>

    <script>
        const SHEET_ID = '1HJ1UDVuzqvWS66hprx8dSFqqoS0OVvZFGOGaRtyDPu8'; 
        const SHEET_NAME = 'Sheet1'; 

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                // כאן הוספתי את הסינון (filter) שמתעלם משורת הכותרת
                const data = rows
                    .map(r => ({
                        book: r.c[0]?.v,
                        grade: r.c[1]?.v,
                        chapter: r.c[2]?.v,
                        unit: r.c[3]?.v,
                        link: r.c[4]?.v,
                        color: r.c[5]?.v || 'blue'
                    }))
                    .filter(item => item.book && item.book !== 'Book' && item.link); // מסנן כותרות ושורות ריקות

                renderBooks(data);
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerHTML = `<div class="text-red-500">שגיאה בטעינה. וודא שהגיליון שותף.</div>`;
            }
        }

        function renderBooks(data) {
            const content = document.getElementById('content');
            content.innerHTML = ''; // ניקוי התוכן לפני רינדור מחדש
            
            const books = [...new Set(data.map(d => d.book))];

            books.forEach(bookTitle => {
                const bookData = data.filter(d => d.book === bookTitle);
                const color = bookData[0].color; 
                
                let bookHtml = `
                    <div class="bg-white rounded-[2.5rem] shadow-xl border-t-8 border-${color}-500 overflow-hidden mb-8 animate-fade-in">
                        <div class="p-6 bg-${color}-50 flex justify-between items-center border-b border-slate-100">
                            <h2 class="text-3xl font-black text-${color}-900">${bookTitle}</h2>
                            <span class="bg-${color}-500 text-white px-6 py-1 rounded-full text-sm font-black shadow-sm">${bookData[0].grade}</span>
                        </div>
                        <div class="p-6 space-y-6">`;

                const chapters = [...new Set(bookData.map(d => d.chapter))];
                chapters.forEach(ch => {
                    bookHtml += `
                        <div>
                            <div class="flex items-center gap-2 mb-3">
                                <div class="h-2 w-2 rounded-full bg-${color}-400"></div>
                                <h3 class="font-extrabold text-slate-400 uppercase tracking-wider text-xs">${ch || 'כללי'}</h3>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;
                    
                    const units = bookData.filter(d => d.chapter === ch);
                    units.forEach(u => {
                        const fullUrl = `app/index.html?w=${u.link}`;
                        bookHtml += `
                            <a href="${fullUrl}" target="_blank" class="flex justify-between items-center p-4 bg-slate-50 hover:bg-${color}-100 rounded-2xl transition-all group border border-transparent hover:border-${color}-200">
                                <span class="font-bold text-slate-700 group-hover:text-${color}-900 text-right">${u.unit}</span>
                                <div class="bg-white p-2 rounded-lg shadow-sm group-hover:shadow-md transition-all">
                                    <span class="text-xl">🎮</span>
                                </div>
                            </a>`;
                    });
                    bookHtml += `</div></div>`;
                });
                bookHtml += `</div></div>`;
                content.innerHTML += bookHtml;
            });
        }
        loadData();
    </script>
</body>
</html>
