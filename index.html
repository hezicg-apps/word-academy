<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        
        /* שלוש עמודות במחשב */
        .grid-layout {
            display: grid;
            grid-template-cols: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        @media (min-width: 1024px) {
            .grid-layout { grid-template-cols: repeat(3, 1fr); }
        }

        /* עיצוב כרטיסיית ספר */
        .book-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            height: fit-content;
        }

        /* כותרת פרק - טקסט לשמאל וחץ לימין */
        .chapter-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            direction: ltr; /* אנגלית/שמאל */
            border-bottom: 1px solid #f1f5f9;
        }

        .chapter-title { font-weight: 800; color: #475569; font-size: 0.9rem; }
        .chevron { transition: transform 0.3s; color: #cbd5e1; }
        
        /* רשימת יחידות */
        .units-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #f8fafc; }
        .is-open .units-list { max-height: 500px; }
        .is-open .chevron { transform: rotate(180deg); }

        .unit-link {
            display: block;
            padding: 0.75rem 2rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            direction: ltr;
            text-align: left;
        }
        .unit-link:hover { background: white; color: #1e293b; }
    </style>
</head>
<body>

    <header class="p-8 flex justify-between items-center max-w-6xl mx-auto" style="direction: ltr;">
        <div class="flex items-center gap-4">
            <img src="Logo.svg" alt="Logo" class="w-14 h-14">
            <div style="direction: rtl; text-align: right;">
                <h1 class="text-3xl font-black text-blue-600 leading-none">Word Academy</h1>
                <p class="text-gray-400 font-bold">🦉 תרגול אוצר מילים בכיף</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">כניסת תלמידים</button>
        </div>
    </header>

    <div id="loading" class="text-center py-10 font-bold text-blue-400 animate-pulse">מתחבר לנתונים...</div>
    <main id="library-content" class="grid-layout"></main>

    <script>
        const SHEET_ID = '1HJ1UDVuzqvWS66hprx8dSFqqoS0OVvZFGOGaRtyDPu8';
        
        async function loadLibrary() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const data = rows.map(r => ({
                    book: r.c[0]?.v,
                    grade: r.c[1]?.v,
                    chapter: r.c[2]?.v,
                    unit: r.c[3]?.v,
                    link: r.c[4]?.v,
                    color: r.c[5]?.v || '#3b82f6'
                })).filter(i => i.book && i.book !== 'Book');

                render(data);
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = "שגיאה בטעינת הנתונים";
            }
        }

        function render(data) {
            const container = document.getElementById('library-content');
            const books = [...new Set(data.map(d => d.book))];

            books.forEach(bookName => {
                const bookData = data.filter(d => d.book === bookName);
                const color = bookData[0].color;
                
                let html = `
                    <div class="book-card border-t-8" style="border-color: ${color}">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h2 class="text-2xl font-extrabold text-slate-800">${bookName}</h2>
                            <span class="text-xs font-black px-3 py-1 rounded-full text-white" style="background: ${color}">${bookData[0].grade}</span>
                        </div>
                        <div>`;

                const chapters = [...new Set(bookData.map(d => d.chapter))];
                chapters.forEach(ch => {
                    const units = bookData.filter(u => u.chapter === ch);
                    html += `
                        <div class="chapter-row">
                            <div class="chapter-btn" onclick="this.parentElement.classList.toggle('is-open')">
                                <span class="chapter-title">${ch ? ch.toUpperCase() : 'GENERAL'}</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div class="units-list">
                                ${units.map(u => `<a href="app/index.html?w=${u.link}" target="_blank" class="unit-link">${u.unit}</a>`).join('')}
                            </div>
                        </div>`;
                });

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
        loadLibrary();
    </script>
</body>
</html>
