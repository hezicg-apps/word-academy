<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Academy | הספרים שלנו</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-blue: #38bdf8;   /* כחול לוגו */
            --logo-purple: #a855f7; /* סגול לוגו */
            --text-black: #1e293b;
            --bg-light: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-black);
        }

        /* Header עיצוב לפי הדרישות החדשות */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4%;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* צד שמאל: לוגו ושם */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .header-left img {
            height: 45px;
            width: auto;
        }

        .brand-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: black; /* ברירת מחדל לשאר האותיות */
            letter-spacing: -0.5px;
        }

        .brand-text span.w { color: var(--logo-blue); }
        .brand-text span.a { color: var(--logo-purple); }

        /* צד ימין: כפתורי כניסה */
        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-teacher {
            background-color: #f1f5f9;
            color: var(--text-black);
        }

        .btn-student {
            background: linear-gradient(135deg, var(--logo-purple), var(--logo-blue));
            color: white;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.2);
        }

        .btn-student:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(168, 85, 247, 0.3);
        }

        /* גריד הספרים */
        .container {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            text-align: center;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .book-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .book-card:hover {
            transform: translateY(-8px);
            border-color: var(--logo-blue);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        .book-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .book-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 10px 0 5px 0;
        }

        .book-grade {
            font-size: 0.95rem;
            color: #64748b;
        }

        .add-book-card {
            border: 2px dashed #e2e8f0;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        @media (max-width: 768px) {
            header { padding: 1rem 15px; }
            .brand-text { display: none; } /* בטלפון נשאיר רק לוגו כדי לחסוך מקום */
            .books-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="header-left">
            <img src="Logo.svg" alt="Word Academy">
            <div class="brand-text">
                <span class="w">W</span>ord <span class="a">A</span>cademy
            </div>
        </a>

        <div class="header-right">
            <a href="#" class="btn btn-teacher">כניסת מורים</a>
            <a href="#" class="btn btn-student">כניסת תלמידים</a>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">בחר ספר לימוד</h2>
        
        <div class="books-grid">
            <div class="book-card">
                <span class="book-icon">📚</span>
                <div class="book-title">Epic</div>
                <div class="book-grade">כיתה ג'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">🏆</span>
                <div class="book-title">Legendary</div>
                <div class="book-grade">כיתה ד'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">✨</span>
                <div class="book-title">Magical</div>
                <div class="book-grade">כיתה ה'</div>
            </div>

            <div class="book-card">
                <span class="book-icon">💡</span>
                <div class="book-title">Think About It</div>
                <div class="book-grade">כיתה ו'</div>
            </div>

            <div class="book-card add-book-card">
                <span style="font-size: 2rem; color: #94a3b8;">+</span>
                <div class="book-title" style="color: #94a3b8;">הוסף ספר משלך</div>
                <div class="book-grade">או בקשו מאיתנו</div>
            </div>
        </div>
    </div>

</body>
</html>
